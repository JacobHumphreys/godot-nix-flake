name: Update Godot versions

on:
  schedule:
  # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    if: ${{ github.event.repository.fork == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate versions.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update-versions.py

      - name: Show diff
        run: git --no-pager diff -- versions.json || true

      - name: Open / update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-godot-versions
          base: main
          title: "chore: update Godot versions"
          commit-message: "chore: update versions.json"
          body: |
            Automated update from [godotengine/godot-builds](https://github.com/godotengine/godot-builds) releases.

            Generated by `.github/workflows/update-versions.yml`.
          labels: |
            automated
            godot-versions
          delete-branch: true
          maintainer-can-modify: false
